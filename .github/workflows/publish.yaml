---
name: publish
on:
  push:
    branches-ignore:
      - '*'
    tags:
      - 'v[0-9]*'
  workflow_dispatch:
    inputs:
      version:
        description: "Version to be published (e.g., v1.43.0, v1.43.0-1)"
        required: true
        type: string
        default: "latest"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Get image tags
        id: image_tags
        run: |
          REGISTRY="${{ vars.IMAGE_REGISTRY }}/${{ vars.IMAGE_REPOSITORY }}"
          IMAGE="${REGISTRY}/${{ vars.IMAGE_NAME }}"

          if [[ -n "${{ github.event.inputs.version }}" ]]; then
            VERSION="${{ github.event.inputs.version }}"
            TAGS="${IMAGE}:${VERSION}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
            MINOR="${VERSION%.*}"
            TAGS="${IMAGE}:latest,${IMAGE}:${MINOR},${IMAGE}:${VERSION}"
          fi

          echo "TAGS=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.IMAGE_REGISTRY }}
          username: ${{ secrets.IMAGE_REGISTRY_USERNAME }}
          password: ${{ secrets.IMAGE_REGISTRY_PASSWORD }}

      - name: Build and push multi-arch image
        if: steps.image_tags.outputs.TAGS
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Containerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.image_tags.outputs.TAGS }}

